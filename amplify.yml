version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend/react-app
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/react-app/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/react-app/node_modules/**/*
